<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Htut Khaing – Portfolio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #020204;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #landing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .landing-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .glass-text {
            color: transparent;
            background: linear-gradient(135deg, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.4) 25%, rgba(255, 255, 255, 0.1) 45%, rgba(255, 255, 255, 0.9) 55%, rgba(255, 255, 255, 0.2) 75%, rgba(255, 255, 255, 1) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.3);
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.4)) drop-shadow(0 5px 10px rgba(0,0,0,0.2));
            animation: shimmer 8s linear infinite;
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(30px);
            animation: shimmer 8s linear infinite, fadeInUp 1s ease forwards;
        }

        @keyframes shimmer {
            0% { background-position: 200% center; }
            100% { background-position: 0% center; }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 3rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease 0.3s forwards;
        }

        .press-key {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 12px;
            background: rgba(34, 211, 238, 0.05);
            backdrop-filter: blur(12px);
            font-size: 1rem;
            font-weight: 500;
            color: rgba(34, 211, 238, 0.9);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease 0.6s forwards, pulse 2s ease-in-out 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.05); }
        }

        .key-icon {
            width: 24px;
            height: 24px;
            border: 1px solid rgba(34, 211, 238, 0.5);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            background: rgba(34, 211, 238, 0.1);
        }

        .fade-out {
            animation: fadeOut 0.8s ease forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(1.1);
                filter: blur(20px);
            }
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(2, 2, 4, 0.8) 100%);
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <canvas id="landing-canvas"></canvas>
    <div class="vignette"></div>

    <div class="landing-content" id="landing">
        <h1 class="glass-text">MIN HTUT KHAING</h1>
        <p class="subtitle">A curated showcase of my projects, ambitions, and dreams.</p>
        <div class="press-key">
            <span class="key-icon">↵</span>
            <span>Press any key</span>
        </div>
    </div>

    <script>
        // Pixel Canvas Animation
        const canvas = document.getElementById('landing-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }

        function initParticles() {
            particles = [];
            const gap = 6;
            const colors = ['rgba(34, 211, 238, 0.3)', 'rgba(16, 185, 129, 0.3)', 'rgba(139, 92, 246, 0.3)'];

            for (let x = 0; x < canvas.width; x += gap) {
                for (let y = 0; y < canvas.height; y += gap) {
                    const dx = x - canvas.width / 2;
                    const dy = y - canvas.height / 2;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const delay = distance * 0.5;

                    particles.push({
                        x, y,
                        size: 0,
                        maxSize: Math.random() * 1.5 + 0.5,
                        speed: Math.random() * 0.02 + 0.01,
                        delay,
                        counter: 0,
                        growing: true,
                        color: colors[Math.floor(Math.random() * colors.length)]
                    });
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.counter++;

                if (p.counter > p.delay) {
                    if (p.growing) {
                        p.size += p.speed;
                        if (p.size >= p.maxSize) {
                            p.growing = false;
                        }
                    } else {
                        p.size -= p.speed * 0.5;
                        if (p.size <= p.maxSize * 0.5) {
                            p.growing = true;
                        }
                    }

                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                }
            });

            animationId = requestAnimationFrame(animate);
        }

        // Initialize
        resizeCanvas();
        animate();
        window.addEventListener('resize', resizeCanvas);

        // Key press handler
        let keyPressed = false;

        function enterSite() {
            if (keyPressed) return;
            keyPressed = true;

            const landing = document.getElementById('landing');
            landing.classList.add('fade-out');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 800);
        }

        // Listen for any key press
        document.addEventListener('keydown', enterSite);
        document.addEventListener('click', enterSite);
        document.addEventListener('touchstart', enterSite);
    </script>
</body>
</html>
